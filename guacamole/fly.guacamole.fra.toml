# Guacamole HTML5 web client -- the official image directly, configured
# entirely via env vars (it bundles the JSON auth extension already). Set the
# secret with `fly secrets set -a diract-guacamole-fra JSON_SECRET_KEY=...`
# before first deploy -- see README.md.
# CAUTION: fly deploy on a fresh app's first deploy auto-creates a second
# "HA/zero-downtime" machine here, running alongside the first -- fine for
# a stateless app, but Guacamole keeps session state in-memory per
# instance with no shared store, so two machines behind the load
# balancer silently break login (a token minted on one machine gets
# rejected when a later request lands on the other). Confirmed directly:
# this happened on first deploy and caused real login failures for two
# users before being caught. After any redeploy, verify with
# `fly status -a diract-guacamole-fra` that exactly one
# machine is running -- if a second one appears, `fly scale count 1 -a
# diract-guacamole-fra` to remove it, matching how
# diract-guacamole (syd) has always run.
app = "diract-guacamole-fra"
primary_region = "fra"

[build]
  image = "guacamole/guacamole:1.5.5"

[env]
  GUACD_HOSTNAME = "diract-guacd-fra.internal"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
