# Guacamole HTML5 web client -- the official image directly, configured
# entirely via env vars (it bundles the JSON auth extension already). Set the
# secret with `fly secrets set -a diract-guacamole-syd JSON_SECRET_KEY=...`
# before first deploy -- see README.md.
app = "diract-guacamole-syd"
primary_region = "syd"

[build]
  image = "guacamole/guacamole:1.5.5"

[env]
  GUACD_HOSTNAME = "diract-guacd-syd.internal"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
